name: Build & Push for Raspberry Pi

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ====================== LOWERCASE OWNER (fixes the error) ======================
      - name: Lowercase repository owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # ====================== BACKEND ======================
      - name: Build & push backend (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./hue-backend
          file: ./hue-backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner }}/hue-web-app-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ====================== FRONTEND ======================
      - name: Build & push frontend (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./hue-frontend
          file: ./hue-frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner }}/hue-web-app-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max