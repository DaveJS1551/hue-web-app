name: Build & Push for Raspberry Pi

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm/v7 + arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # ====================== BACKEND (both architectures) ======================
      - name: Build & push backend (arm/v7 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: .                          # ← CHANGED: root of repo
          file: ./hue-backend/Dockerfile      # ← full path to Dockerfile
          platforms: linux/arm/v7,linux/arm64
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner }}/hue-web-app-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ====================== FRONTEND (both architectures) ======================
      - name: Build & push frontend (arm/v7 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./hue-frontend/Dockerfile
          platforms: linux/arm/v7,linux/arm64
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner }}/hue-web-app-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max